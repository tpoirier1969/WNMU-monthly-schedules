<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <title>WNMU Month Rollup</title>
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#0d4f38">
  <style>
    :root{--green:#0d4f38;--navy:#17345f;--line:#cfd8e3;--soft:#f3f6fb;--ink:#172033}
    *{box-sizing:border-box}body{margin:0;background:var(--soft);color:var(--ink);font:14px/1.35 system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}.wrap{max-width:1320px;margin:0 auto;padding:22px}.top{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;margin-bottom:14px}.title h1{margin:0 0 4px;color:var(--green);font-size:30px}.sub{margin:0;color:#53627a}.tools{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end}.btn{display:inline-flex;align-items:center;justify-content:center;text-decoration:none;border:1px solid var(--line);border-radius:999px;background:#fff;color:var(--navy);font-weight:850;padding:9px 13px;cursor:pointer}.btn.primary{background:var(--green);border-color:var(--green);color:#fff}.badge{display:inline-flex;border:1px solid #c8d3e2;background:#fff;border-radius:999px;color:#17345f;font-size:12px;font-weight:850;padding:7px 11px}.status{margin:8px 0 14px;color:#5d6c82;font-size:13px}.panel{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 4px 16px rgba(23,52,95,.08);overflow:hidden}.rollup-table{width:100%;border-collapse:collapse;font-size:12px}.rollup-table th,.rollup-table td{border-top:1px solid #e6ebf2;text-align:left;vertical-align:top;padding:6px 8px}.rollup-table thead th{position:sticky;top:0;background:#eef3f8;color:var(--navy);font-weight:900;z-index:1}.rollup-table td:nth-child(1){white-space:nowrap;font-weight:800}.rollup-table td:nth-child(2),.rollup-table td:nth-child(3){white-space:nowrap}.muted{color:#617086;font-size:11px}.tag{display:inline-flex;border:1px solid #d5dde8;background:#f7f9fd;border-radius:999px;padding:2px 6px;margin:0 3px 3px 0;white-space:nowrap}.blank-row{background:#fffdf2}.empty,.error{padding:18px}.error{color:#8a1f1f;background:#fff3f3}.print-note{margin-top:10px;color:#667;font-size:12px}
    @media print{ @page{size:letter landscape;margin:.25in} body{background:#fff;font-size:10px}.wrap{max-width:none;padding:0}.tools,.status,.print-note{display:none!important}.top{margin-bottom:6px}.title h1{font-size:16px;color:#000}.sub{font-size:9px;color:#333}.badge{border:0;padding:0;font-size:8px}.panel{border:0;box-shadow:none;border-radius:0;overflow:visible}.rollup-table{font-size:8px;line-height:1.05}.rollup-table th,.rollup-table td{padding:2px 3px}.rollup-table thead th{position:static;background:#eee;color:#000}.muted{font-size:7px}.tag{font-size:7px;padding:0 3px;margin:0 1px 1px 0}.many-items .rollup-table{font-size:7px}.many-items .rollup-table th,.many-items .rollup-table td{padding:1px 2px}}
  </style>
</head>
<body>
  <main class="wrap">
    <header class="top">
      <div class="title">
        <h1 id="pageTitle">WNMU Month Rollup</h1>
        <p class="sub" id="pageSub">Loading selected month…</p>
      </div>
      <div class="tools">
        <span class="badge" id="versionBadge">Month Rollup v1.5.19</span>
        <a class="btn" id="homeLink" href="index.html?v=1.5.19">Home</a>
        <a class="btn" id="scheduleLink" href="#">Schedule grid</a>
        <button class="btn primary" type="button" onclick="window.print()">Print rollup</button>
      </div>
    </header>
    <div id="status" class="status">Loading…</div>
    <section class="panel" id="rollupBody"></section>
    <div class="print-note">Print tip: this report is built for landscape printing. Browser scaling may still need “Fit to page” if a month has a large number of marked programs.</div>
  </main>
  <script src="config.js"></script>
  <script src="month-rollup.v1.5.19.js?v=1.5.19"></script>
</body>
</html>
