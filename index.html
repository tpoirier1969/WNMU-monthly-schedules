<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>WNMU1HD May 2026 Rebuild</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>WNMU1HD May 2026</h1>
      <p class="sub">External-data rebuild • 30-minute slot calendar</p>
    </div>
    <div class="flags">
      <span class="flag" id="versionFlag">version</span>
      <span class="flag ok" id="coverageFlag">coverage</span>
    </div>
  </header>

  <main class="layout">
    <section class="month-panel">
      <div class="month-header">
        <h2>Month grid</h2>
        <p>Click any day for the full schedule.</p>
      </div>
      <div id="monthGrid" class="month-grid" aria-live="polite"></div>
    </section>

    <aside class="day-panel">
      <div class="day-header">
        <h2 id="dayTitle">Select a day</h2>
        <p id="dayMeta">Coverage summary will appear here.</p>
      </div>
      <div id="scheduleList" class="schedule-list"></div>
    </aside>
  </main>

  <template id="dayCardTemplate">
    <button class="day-card" type="button">
      <div class="day-card-head">
        <div class="date-line"></div>
        <div class="slot-badge"></div>
      </div>
      <div class="peek-list"></div>
    </button>
  </template>

  <template id="entryTemplate">
    <article class="entry">
      <div class="entry-time"></div>
      <div class="entry-body">
        <div class="entry-title"></div>
        <div class="entry-meta"></div>
      </div>
    </article>
  </template>

  <script src="app.js" defer></script>
</body>
</html>
