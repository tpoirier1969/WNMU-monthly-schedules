<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WNMU Monthly Shareboard</title>
<link rel="icon" type="image/svg+xml" href="assets/icon-month.svg">
<style>
:root{--ink:#1f1f1f;--blue:#203864;--line:#cfd8e3;--panel:#f7f9fc;--accent:#e8effa}
body{font-family:Calibri,Arial,sans-serif;margin:0;background:#fff;color:var(--ink)}
.wrap{max-width:980px;margin:0 auto;padding:24px}
h1{margin:0 0 18px;color:var(--blue);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:18px}
.card{border:1px solid var(--line);border-radius:16px;background:var(--panel);padding:18px;box-shadow:0 6px 18px rgba(0,0,0,.04)}
.card h2{margin:0 0 8px;color:var(--blue)}
.meta{font-size:13px;color:#5b6573;margin-bottom:14px}
.actions{display:flex;gap:10px;flex-wrap:wrap}
.btn{display:inline-block;padding:10px 14px;border-radius:10px;background:var(--accent);color:var(--blue);text-decoration:none;font-weight:700;border:1px solid #afc1df}
.badge{display:inline-block;background:var(--blue);color:#fff;border-radius:999px;padding:3px 8px;font-size:12px;font-weight:700}
</style>
</head>
<body>
<div class="wrap">
<h1><img src="assets/icon-month.svg" alt="Monthly calendar icon" style="width:56px;height:56px;flex:0 0 auto">WNMU Monthly Shareboard <span class="badge">v13.11</span></h1>
<div class="grid">
  <section class="card">
    <h2>WNMU1HD</h2>
    <div class="meta">May 2026 shareboard</div>
    <div class="actions"><a class="btn" href="channels/wnmu1hd/index.html">Open WNMU1HD</a></div>
  </section>
  <section class="card">
    <h2>WNMU3PL</h2>
    <div class="meta">May 2026 report board</div>
    <div class="actions"><a class="btn" href="channels/wnmu3pl/index.html">Open WNMU3PL</a></div>
  </section>
</div>
</div>
</body>
</html>
