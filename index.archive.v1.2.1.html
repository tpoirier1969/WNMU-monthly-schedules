<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>WNMU May 2026 Archives</title>
  <style>
    body{margin:0;font:15px/1.35 system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#f4f6fa;color:#111}
    main{max-width:1200px;margin:0 auto;padding:28px 18px 40px}
    h1{margin:0 0 8px;font-size:30px}
    p{margin:0 0 16px;color:#444}
    .top-links{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 22px}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:999px;border:1px solid #bfc8d6;background:#fff;color:#17345f;text-decoration:none;font-weight:600}
    .archive-shell{background:#fff;border:1px solid #d8dce3;border-radius:14px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
    .archive-two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .archive-column h2{margin:0 0 10px;font-size:20px;color:#17345f}
    .archive-compact-list{list-style:none;margin:0;padding:0;border:1px solid #d9e0ea;border-radius:10px;overflow:hidden}
    .archive-compact-list li{display:block;padding:7px 10px;border-top:1px solid #e6ebf2;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .archive-compact-list li:first-child{border-top:0}
    .archive-compact-list a{color:#17345f;text-decoration:none;font-weight:600;margin-right:8px}
    .archive-date{color:#666;margin-right:8px}
    .archive-note-inline{color:#777}
    .archive-empty-inline{color:#777;font-style:italic}
    .archive-error{background:#fff3f3;border:1px solid #e3b6b6;border-radius:10px;padding:12px;color:#8a1f1f}
    @media (max-width:900px){.archive-two-col{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main>
    <h1>WNMU May 2026 Archives</h1>
    <p>Compact archive listing by channel.</p>
    <div class="top-links">
      <a class="btn" href="index131.v1.2.0.html">Open 13.1</a>
      <a class="btn" href="index133.v1.2.0.html">Open 13.3</a>
    </div>
    <section class="archive-shell">
      <div id="archiveList"><div class="archive-empty-inline">Loading archive list…</div></div>
    </section>
  </main>
  <script src="config.js"></script>
  <script src="archive-tools.v1.2.1.js?v=1.2.1" defer></script>
</body>
</html>
